name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-builder-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Electron app
        run: npm run build && npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        shell: bash
        run: |
          MSG=$(git log -1 --format='%s' HEAD 2>/dev/null || echo "Release v${{ steps.version.outputs.VERSION }}")
          echo "MESSAGE=${MSG}" >> $GITHUB_OUTPUT

      - name: Compute SHA256
        id: hash
        shell: bash
        run: |
          SHA256=$(sha256sum "dist/alspos Setup.exe" | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

      - name: Install TUS client
        run: npm install --no-save tus-js-client

      - name: Split installer into chunks
        id: chunks
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          FILE_SIZE=$(stat -c%s "dist/alspos Setup.exe" 2>/dev/null || wc -c < "dist/alspos Setup.exe")
          CHUNK_DIR="dist/chunks"
          mkdir -p "$CHUNK_DIR"
          split -b 45m --numeric-suffixes --suffix-length=3 "dist/alspos Setup.exe" "${CHUNK_DIR}/chunk-"
          CHUNK_COUNT=$(ls -1 "${CHUNK_DIR}/chunk-"* | wc -l)
          echo "FILE_SIZE=${FILE_SIZE}" >> $GITHUB_OUTPUT
          echo "CHUNK_COUNT=${CHUNK_COUNT}" >> $GITHUB_OUTPUT
          echo "Split into ${CHUNK_COUNT} chunks, total size: ${FILE_SIZE} bytes"

      - name: Upload chunks to Supabase Storage
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          STORAGE_PATH="releases/v${VERSION}/alspos-setup-${VERSION}.exe"
          echo "STORAGE_PATH=${STORAGE_PATH}" >> $GITHUB_ENV

          CHUNK_COUNT=${{ steps.chunks.outputs.CHUNK_COUNT }}
          for i in $(seq 0 $((CHUNK_COUNT - 1))); do
            INDEX=$(printf "%03d" $i)
            CHUNK_FILE="dist/chunks/chunk-${INDEX}"
            echo "Uploading chunk $i: ${CHUNK_FILE}"
            export FILE_PATH="${CHUNK_FILE}"
            export UPLOAD_PATH="${STORAGE_PATH}.part${i}"
            node scripts/tus-upload.mjs
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Register release
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHUNK_COUNT="${{ steps.chunks.outputs.CHUNK_COUNT }}"
          FILE_SIZE="${{ steps.chunks.outputs.FILE_SIZE }}"
          
          curl -s -f -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/register-release" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "version": "'"${VERSION}"'",
              "platform": "win32",
              "arch": "x64",
              "channel": "stable",
              "storagePath": "'"${STORAGE_PATH}"'",
              "fileName": "alspos-setup-'"${VERSION}"'.exe",
              "sha256": "'"${{ steps.hash.outputs.SHA256 }}"'",
              "releaseNotes": "'"${{ steps.commit.outputs.MESSAGE }}"'",
              "mandatory": false,
              "rolloutPercent": 100,
              "chunkCount": '"${CHUNK_COUNT}"',
              "fileSize": '"${FILE_SIZE}"'
            }'

      - name: Summary
        shell: bash
        run: |
          echo "## Release v${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** alspos-setup-${{ steps.version.outputs.VERSION }}.exe" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${{ steps.chunks.outputs.FILE_SIZE }} bytes" >> $GITHUB_STEP_SUMMARY
          echo "- **Chunks:** ${{ steps.chunks.outputs.CHUNK_COUNT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA256:** \`${{ steps.hash.outputs.SHA256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Bucket:** app-releases" >> $GITHUB_STEP_SUMMARY
          echo "- **Path:** ${STORAGE_PATH}" >> $GITHUB_STEP_SUMMARY
